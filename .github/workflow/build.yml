name: Build iOS IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Apple Certificate and Provisioning Profile
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
      run: |
        # Create temporary keychain variables
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

        # Import certificate and profile from secrets
        echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
        echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

        # Create and unlock a temporary keychain
        security create-keychain -p "" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "" $KEYCHAIN_PATH

        # Import certificate to the keychain
        security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" $KEYCHAIN_PATH

        # Install provisioning profile
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

    - name: Build Xcode Archive
      run: |
        xcodebuild -workspace ios/YourApp.xcworkspace \
                   -scheme YourScheme \
                   -sdk iphoneos \
                   -configuration Release \
                   -archivePath $RUNNER_TEMP/YourApp.xcarchive \
                   archive

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
                   -archivePath $RUNNER_TEMP/YourApp.xcarchive \
                   -exportOptionsPlist ios/ExportOptions.plist \
                   -exportPath $RUNNER_TEMP/build

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-ipa
        path: ${{ github.workspace }}/../settings/temp/build/*.ipa
